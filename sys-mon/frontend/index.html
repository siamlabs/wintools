<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sys-mon</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --blue: #58a6ff;
      --gray: #6e7681;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      overflow: hidden;
      user-select: none;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: var(--surface);
      border-bottom: 1px solid var(--border); -webkit-app-region: drag;
    }
    .titlebar-title { font-weight: 600; font-size: 13px; letter-spacing: 0.3px; }
    .titlebar-badge { background: var(--red); color: white; padding: 1px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .threat-bar { display: flex; gap: 12px; padding: 5px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; }
    .threat-item { display: flex; align-items: center; gap: 3px; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel:first-child { border-right: 1px solid var(--border); }
    .panel-header { padding: 4px 12px; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); background: var(--surface); border-bottom: 1px solid var(--border); }
    .panel-body { flex: 1; overflow-y: auto; padding: 2px 0; }
    .port-row { display: flex; align-items: center; padding: 4px 12px; gap: 8px; border-bottom: 1px solid rgba(48,54,61,0.5); transition: background 0.1s; }
    .port-row:hover { background: rgba(255,255,255,0.03); }
    .threat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .threat-dot.critical { background: var(--red); }
    .threat-dot.high { background: #f0883e; }
    .threat-dot.medium { background: var(--yellow); }
    .threat-dot.low { background: var(--green); }
    .threat-dot.gone { background: var(--gray); }
    .threat-dot.info { background: var(--blue); }
    .port-addr { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; min-width: 130px; }
    .port-process { color: var(--text-dim); font-size: 11px; min-width: 90px; }
    .port-pid { color: var(--text-dim); font-size: 10px; min-width: 50px; }
    .port-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--border); color: var(--text-dim); text-transform: uppercase; }
    .port-actions { display: flex; gap: 3px; margin-left: auto; }
    .btn { padding: 2px 8px; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 3px; cursor: pointer; font-size: 10px; transition: all 0.1s; }
    .btn:hover { background: rgba(255,255,255,0.05); }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: white; }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(248,81,73,0.1); }
    .btn-success { border-color: var(--green); color: var(--green); }
    .btn-success:hover { background: rgba(63,185,80,0.1); }
    .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; background: var(--surface); border-top: 1px solid var(--border); font-size: 10px; color: var(--text-dim); }
    .status-left, .status-right { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .status-dot.running { background: var(--green); }
    .status-dot.paused { background: var(--gray); }
    .interval-input { width: 40px; padding: 1px 3px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 2px; text-align: center; font-size: 10px; }
    .empty { padding: 20px; text-align: center; color: var(--text-dim); font-style: italic; }
    .wsl-tag { font-size: 9px; padding: 1px 4px; border-radius: 2px; background: rgba(88,166,255,0.15); color: var(--blue); }
    .signed { color: var(--green); font-size: 9px; }
    .unsigned { color: var(--red); font-size: 9px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
